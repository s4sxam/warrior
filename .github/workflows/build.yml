name: Build & Publish Warrior APK

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # 🛠️ FIX 1: Generate the missing gradle-wrapper.jar file automatically!
      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version=8.7

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 🛠️ FIX 2: Added --no-daemon to prevent Out Of Memory (OOM) crashes
      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Warrior2026-APK
          path: app/build/outputs/apk/debug/app-debug.apk

      # 🛠️ FIX 3: Added GITHUB_TOKEN so it has permission to create the Release page
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Warrior 2026 ${{ github.ref_name }}
          files: app/build/outputs/apk/debug/app-debug.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
