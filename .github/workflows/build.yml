name: Build & Publish Warrior APK

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version=8.7

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEY_STORE_BASE64 }}" | base64 --decode > app/warrior-release.jks

      # [FIX BUG 7] Derive VERSION_NAME from the git tag and VERSION_CODE from
      # the GitHub run number. Both are passed as environment variables so
      # build.gradle.kts can read them — the APK's versionName will always
      # match the tag, and versionCode auto-increments with every CI run.
      #
      # On a branch push (no tag), VERSION_NAME falls back to "0.0.0-dev"
      # so the build still succeeds without showing a fake version to users.
      - name: Resolve version from tag
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF_NAME}"          # e.g. "v2.3.0"
            echo "VERSION_NAME=${TAG}" >> $GITHUB_OUTPUT
          else
            echo "VERSION_NAME=0.0.0-dev" >> $GITHUB_OUTPUT
          fi
          echo "VERSION_CODE=${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Build Release APK
        env:
          VERSION_NAME: ${{ steps.version.outputs.VERSION_NAME }}
          VERSION_CODE: ${{ steps.version.outputs.VERSION_CODE }}
          KEY_STORE_PATH: warrior-release.jks
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Warrior2026-APK
          path: app/build/outputs/apk/release/app-release.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Warrior ${{ github.ref_name }}
          files: app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}